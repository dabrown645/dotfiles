format = """
[вЦСвЦТвЦУ](#a3aed2)\
$os\
${custom.chezmoi}\
[оВі](bg:#769ff0 fg:#a3aed2)\
${custom.distrobox}\
[оВі](bg:#769ff0 fg:#a3aed2)\
$directory\
[оВі](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оВі](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
[оВі](fg:#212736 bg:#1d2230)\
\n$character"""


[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[os]
disabled = false
style = "bold green"
# format = "[ $symbol ]($style)"
format = '[[ $symbol](bg:#a3aed2 fg:#090c0c)]($style)'

[git_branch]
symbol = "пРШ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = "оЬШ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оЮ®"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оШІ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оШИ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ пРЇ $time ](fg:#a0a9cb bg:#1d2230)]($style)'

# Custom configurations...
[custom.chezmoi]
symbol = "рЯУ¶"
command = '''
if [ -n "$CHEZMOI" ]:then
  echo "$CHEZMOI" >/dev/null
fi
'''
when = '''
[ -n "$CHEZMOI" ]
'''
# format = "${output:+рЯУ¶ [$output]($style)} "
format = '[[ $symbol CHEZMOI](bg:#a3aed2 fg:#090c0c)]($style)'
style = "bold green"
description = "Show Distrobox container name"

[custom.distrobox]
symbol = "рЯУ¶"
command = '''
if [ -n "$DISTROBOX_ENTER_PATH" ] && [ -f /run/.containerenv ]; then
    grep -oP '(?<=name=")[^"]+' /run/.containerenv 2>/dev/null
fi
'''
when = '''
[ -n "$DISTROBOX_ENTER_PATH" ] && [ -f /run/.containerenv ]
'''
# format = "${output:+рЯУ¶ [$output]($style)} "
format = '[[ $symbol $output](bg:#a3aed2 fg:#090c0c)]($style)'
style = "bold green"
description = "Show Distrobox container name"

