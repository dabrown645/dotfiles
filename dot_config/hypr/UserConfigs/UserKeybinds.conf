# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# This is where you put your own keybinds. Be Mindful to check as well ${HOME}/.config/hypr/configs/Keybinds.conf to avoid conflict
# if you think I should replace the Pre-defined Keybinds in ${HOME}/.config/hypr/configs/Keybinds.conf , submit an issue or let me know in DC and present me a valid reason as to why, such as conflicting with global shortcuts, etc etc

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds 

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

#  IMPORTANT: If you want to remap and existing keybind you MUST unbindd it first 

# The bindings are CASE SENSITIVE. We suggest you copy the exisitng binding here
#  Then change `bindd` to `unbind`

# E.g. 
# unbind = $mainMod, Return, Open terminal, exec, $term
# bindd = $mainMod, Return, Open terminal, exec, ghostty 
#
# unbind = $mainMod, E, file manager, exec, $files
# bindd = $mainMod, T, file manager, exec, $files

# If you are ADDING a bindd, make sure you include the description 
# Other the keybind search menu might not show it properly 

# E.g.
# bindd = $mainMod, Z, My z app, exec APPNAME

bindd = $mainMod, M, mail client, exec, $mail 

bind = $mainMod, P, submap,passthru
bind = $mainMod, J, layoutmsg, togglesplit
submap = passthru
bind = $mainMod, Escape, submap, reset
submap = reset


# #override keybinds that switch between windows
# # The following mappings use the key codes to better support various keyboard layouts
# # 1 is code:10, 2 is code 11, etc
# # Switch workspaces with mainMod + [0-9]
# Using JaKooLit default binds from configs/Keybinds.conf - workspace rules handle monitor assignment
# bind = $mainMod, code:10, exec, ~/.config/hypr/UserScripts/WS-switch.sh 1 # NOTE: code:10 = key 1
# bind = $mainMod, code:11, exec, ~/.config/hypr/UserScripts/WS-switch.sh 2 # NOTE: code:11 = key 2
# bind = $mainMod, code:12, exec, ~/.config/hypr/UserScripts/WS-switch.sh 3 # NOTE: code:12 = key 3
# bind = $mainMod, code:13, exec, ~/.config/hypr/UserScripts/WS-switch.sh 4 # NOTE: code:13 = key 4
# bind = $mainMod, code:14, exec, ~/.config/hypr/UserScripts/WS-switch.sh 5 # NOTE: code:14 = key 5
# bind = $mainMod, code:15, exec, ~/.config/hypr/UserScripts/WS-switch.sh 6 # NOTE: code:15 = key 6
# bind = $mainMod, code:16, exec, ~/.config/hypr/UserScripts/WS-switch.sh 7 # NOTE: code:16 = key 7
# bind = $mainMod, code:17, exec, ~/.config/hypr/UserScripts/WS-switch.sh 8 # NOTE: code:17 = key 8
# bind = $mainMod, code:18, exec, ~/.config/hypr/UserScripts/WS-switch.sh 9 # NOTE: code:18 = key 9
# bind = $mainMod, code:19, exec, ~/.config/hypr/UserScripts/WS-switch.sh 10 # NOTE: code:19 = key 10



